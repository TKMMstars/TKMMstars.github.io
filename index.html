<!DOCTYPE html>
<html lang="ko">
<head>

    <title>3D 웹 공포 방탈출</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: black; color: white; font-family: sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 50%; width: 100%; text-align: center; pointer-events: none; }
        #instruction { position: absolute; top: 10px; width: 100%; text-align: center; pointer-events: none; }
    </style>
</head>
<body>
    <div id="instruction">화면을 클릭하면 게임이 시작됩니다. (ESC로 마우스 잠금 해제)</div>
    <div id="ui">+</div> <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
    <script src="game.js"></script>
</body>
</html>
